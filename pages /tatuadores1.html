<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tatuadores — Paranoia Tattoo</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/artist.css">
</head>
<body class="dark">
<header>
  <nav class="navbar">
    <img class="logo" src="../public/img/PARANOIA.png" alt="Paranoia Logo">
    <ul class="nav-links">
      <li><a href="#tatuadores">Tatuadores</a></li>
      <li><a href="#supplies">Supplies</a></li>
      <li><a href="#citas">Agendar</a></li>
      <li><a href="#merch">Merch</a></li>
    </ul>
    <div class="search-bar">
      <input type="text" placeholder="Buscar...">
      <button>🔍</button>
    </div>
  </nav>
</header>



  <main class="artists-page">
    <section class="controls">
      <div class="filters" role="region" aria-label="Filtros de estilos">
        <label for="style-filter" class="visually-hidden">Filtrar por estilo</label>
        <select id="style-filter" aria-label="Filtrar por estilo">
          <option value="">Todos los estilos</option>
          <option value="realismo">Realismo</option>
          <option value="tradicional">Tradicional</option>
          <option value="neo-tradicional">Neo Tradicional</option>
          <option value="blackwork">Blackwork</option>
          <option value="japanese">Japanese</option>
          <option value="minimal">Minimal</option>
        </select>
      </div>

      <div class="sort" role="region" aria-label="Ordenar">
        <label for="sort-by" class="visually-hidden">Ordenar</label>
        <select id="sort-by" aria-label="Ordenar artistas">
          <option value="featured">Destacados</option>
          <option value="name-asc">Nombre A–Z</option>
          <option value="name-desc">Nombre Z–A</option>
        </select>
      </div>
    </section>

    <section id="gallery" class="gallery" aria-live="polite">
      <!-- Tarjetas generadas por JS o estáticas -->
      <!-- Ejemplo de tarjeta -->
      <article class="card" data-name="Luna Rivera" data-style="realismo" data-city="Guadalajara">
        <a class="card-link" href="tatuadores/luna-rivera.html" aria-label="Ver ficha de Luna Rivera">
          <div class="card-media">
            <img src="artists/luna-thumb.jpg" alt="Trabajo de Luna Rivera mostrando realismo en retrato">
          </div>
          <div class="card-body">
            <h3 class="card-title">Luna Rivera</h3>
            <p class="card-meta">Realismo · Guadalajara</p>
          </div>
        </a>
      </article>

      <!-- Repite tarjetas o genera con JS -->
    </section>

    <nav class="pagination" aria-label="Paginación de artistas">
      <button class="page-btn" data-page="prev" aria-label="Página anterior" disabled>‹</button>
      <div class="page-numbers" aria-hidden="true">1 / 4</div>
      <button class="page-btn" data-page="next" aria-label="Página siguiente">›</button>
    </nav>
  </main>

  <footer class="site-footer">
    <p>© Paranoia Tattoo — Guadalajara</p>
  </footer>

  <script src="../js/artist.js"></script>
</body>
</html>
